name: Run Autonomous Energy Agents

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *' # Automated execution run every 30 minutes

jobs:
  execute-loop:
    runs-on: ubuntu-latest  # <-- Fixed typo here
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Run Multi-Agent Core Loop
      run: |
        python main.py
